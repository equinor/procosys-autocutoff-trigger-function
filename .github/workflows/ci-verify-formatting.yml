name: ✏️ Verify formatting

on:
  pull_request:

permissions:
  id-token: write
  contents: read

jobs:
  format-check:
    name: Verify formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify formatting
        run: dotnet format ./src/Equinor.ProCoSys.AutoCutoffFunction --verify-no-changes
