name: 🤖 Build & run tests

on:
  pull_request:

permissions:
  id-token: write
  contents: read

jobs:
  build-test:
    name: Build & run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build solution
        run: dotnet build src/Equinor.ProCoSys.AutoCutoffFunction.sln --configuration Release

      - name: Run tests
        run: dotnet test src/Equinor.ProCoSys.AutoCutoffFunction.sln --configuration Release --no-build
