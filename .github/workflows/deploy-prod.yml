name: 🚀🏭 Deploy to prod

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to prod
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name procosys

      - name: Build Docker image
        run: |
          docker build \
            -t procosys.azurecr.io/autocutoff-function:${{ steps.sha.outputs.short }} \
            -f src/Equinor.ProCoSys.AutoCutoffFunction/Dockerfile \
            src/

      - name: Push Docker image
        run: docker push procosys.azurecr.io/autocutoff-function:${{ steps.sha.outputs.short }}

      - name: Set container image
        run: |
          az functionapp config container set \
            --resource-group pcs-autocutoff-prod-rg \
            --name pcs-autocutoff-prod-func \
            --registry-server https://procosys.azurecr.io \
            --image procosys.azurecr.io/autocutoff-function:${{ steps.sha.outputs.short }}
